# Docker Compose overrides for development environments
services:
  server:
    build:
      context: .
      dockerfile: opendc-web/opendc-web-server/Dockerfile
      args:
        OPENDC_AUTH0_DOMAIN: ${OPENDC_AUTH0_DOMAIN:?No Auth0 domain specified}
        OPENDC_AUTH0_AUDIENCE: ${OPENDC_AUTH0_AUDIENCE:?No Auth0 audience specified}
        OPENDC_AUTH0_DOCS_CLIENT_ID: ${OPENDC_AUTH0_DOCS_CLIENT_ID}
    ports:
      - "8080:8080"
    environment:
      SENTRY_ENVIRONMENT: "development"
      QUARKUS_OIDC_ENABLED: "false"
      QUARKUS_OIDC_TENANT_ENABLED: "false"
      OPENDC_SECURITY_ENABLED: "false"
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: "drop-and-create"
      QUARKUS_FLYWAY_MIGRATE_AT_START: "false"
      QUARKUS_OPENDC_UI_AUTH_DOMAIN: ""

  runner:
    build:
      context: .
      dockerfile: opendc-web/opendc-web-runner/Dockerfile
    environment:
      JAVA_TOOL_OPTIONS: >-
        -Dlog4j2.rootLogger.level=DEBUG
        -Dlog4j2.logger.org.opendc.level=DEBUG
        -Dlog4j2.logger.org.opendc.web.client.level=TRACE
    command: /opt/opendc-web-runner/bin/opendc-runner --no-auth

  postgres:
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    restart: on-failure
    networks:
      - backend
    depends_on:
      - postgres
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'

volumes:
  pgadmin:
